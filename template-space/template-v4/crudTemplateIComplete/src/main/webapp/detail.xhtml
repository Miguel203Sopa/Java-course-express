<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Parent Details</title>
</h:head>

<h:body>

    <h2>Detalles del Parent: #{parentDetailBean.parent.code}</h2>


    <h:form>

        Nombre:
        <h:inputText value="#{parentDetailBean.newDetail.name}" required="true"/>

        Cantidad:
        <h:inputText value="#{parentDetailBean.newDetail.quantity}" required="true"/>

        <h:commandButton value="Agregar Detalle"
                         action="#{parentDetailBean.addDetail}"/>

    </h:form>

    <br/>


    <h:dataTable value="#{parentDetailBean.details}" var="d" border="1">

        <h:column>
            <f:facet name="header">ID</f:facet>
            #{d.id}
        </h:column>

        <h:column>
            <f:facet name="header">Nombre</f:facet>
            #{d.name}
        </h:column>

        <h:column>
            <f:facet name="header">Cantidad</f:facet>
            #{d.quantity}
        </h:column>

        <h:column>
            <h:form>
                <h:commandButton value="Eliminar"
                                 action="#{parentDetailBean.removeDetail(d)}"/>
            </h:form>
        </h:column>

    </h:dataTable>

    <br/>

    <h:link value="← Volver" outcome="Parent.xhtml"/>

</h:body>
</html>
