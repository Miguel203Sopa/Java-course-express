<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Parent Details</title>
</h:head>

<h:body>


    <f:metadata>
        <f:viewParam name="parentId" value="#{detailBean.parentId}" />
        <f:viewAction action="#{detailBean.cargar}" />
    </f:metadata>


    <h2>
        Detalles del Parent:
        <h:outputText value="#{detailBean.parent.name}" rendered="#{not empty detailBean.parent}" />
    </h2>

    <h:messages style="color:red"/>

    <h:form>

        <h:panelGrid columns="2" cellpadding="5">
            <h:outputLabel value="Nuevo detalle:" />

            <h:inputText value="#{detailBean.nuevoDetalle.quantity}"
                         required="true"
                         requiredMessage="Debe escribir una cantidad"/>
        </h:panelGrid>

        <br/>

        <h:commandButton value="Agregar"
                         action="#{detailBean.agregarDetalle}" />

    </h:form>

    <hr/>


    <h:form>

        <h:dataTable value="#{detailBean.detalles}" var="d"
                     border="1" cellpadding="5"
                     rendered="#{not empty detailBean.detalles}">

            <h:column>
                <f:facet name="header">ID</f:facet>
                #{d.id}
            </h:column>

            <h:column>
                <f:facet name="header">Descripción</f:facet>
                #{d.description}
            </h:column>

            <h:column>
                <f:facet name="header">Acción</f:facet>

                <h:commandButton value="Eliminar"
                                 action="#{detailBean.eliminarDetalle(d.id)}"
                                 onclick="return confirm('¿Eliminar registro?');"/>
            </h:column>

        </h:dataTable>

    </h:form>

    <br/>

    <a class="puert" href="Parent.xhtml">Regresar a parent</a>

</h:body>
</html>
