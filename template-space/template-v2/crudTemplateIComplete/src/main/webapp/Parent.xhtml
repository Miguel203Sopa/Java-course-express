<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Parent CRUD</title>
</h:head>

<h:body>

    <h2>Crear Parent</h2>

    <h:form>
        Código:
        <h:inputText value="#{parentBean.parent.code}" /><br/>

        Nombre:
        <h:inputText value="#{parentBean.parent.name}" /><br/>

<!--        Status:-->
<!--        <h:inputText value="{#parentBean.parent.status}"/><br/>-->


        <h:commandButton value="Guardar"
                         action="#{parentBean.guardar}" />
    </h:form>

    <hr/>

    <h2>Lista Parents</h2>

    <h:form>
        <h:dataTable value="#{parentBean.lista}" var="p" border="1">

            <h:column>#{p.id}</h:column>
            <h:column>#{p.code}</h:column>
            <h:column>#{p.name}</h:column>

            <h:column>
                <h:commandButton value="Eliminar"
                                 action="#{parentBean.eliminar(p.id)}" />
            </h:column>

        </h:dataTable>
    </h:form>

</h:body>
</html>
